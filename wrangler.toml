name = "ai-prompting-playbook"
compatibility_date = "2026-07-18"
compatibility_flags = ["global_fetch_strictly_public", "nodejs_compat"]

[observability]
enabled = true

[assets]
binding = "ASSETS"
directory = "dist"

[[kv_namespaces]]
binding = "SESSION"
id = "your_kv_namespace_id"

[[kv_namespaces]]
binding = "CONTACT_FORM"
id = "your_contact_kv_id"
